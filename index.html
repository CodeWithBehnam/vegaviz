<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vegaviz — The Vega & Vega-Lite Chart Gallery</title>
  <meta name="description" content="The ultimate open-source gallery of Vega and Vega-Lite chart specs for Power BI Deneb and beyond. Copy, paste, visualize.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    :root {
      --bg: #e8e4d9;
      --surface: #ffffff;
      --accent: #FF6B35;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #7B68EE;
      --accent5: #FF4081;
      --text: #1a1a2e;
      --text-muted: #555;
      --border: #1a1a2e;
      --shadow: #1a1a2e;
      --radius: 0;
      --border-w: 3px;
      --shadow-offset: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* HEADER */
    .hero {
      border-bottom: var(--border-w) solid var(--border);
      padding: 3rem 2rem 2.5rem;
      text-align: center;
      background: var(--accent3);
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: 1.15rem;
      max-width: 600px;
      margin: 0.5rem auto 0;
      color: var(--text);
    }
    .hero-badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      border: var(--border-w) solid var(--border);
      background: var(--surface);
      box-shadow: 3px 3px 0 var(--shadow);
    }
    .badge--accent { background: var(--accent); color: #fff; }
    .badge--accent2 { background: var(--accent2); }
    .badge--accent4 { background: var(--accent4); color: #fff; }

    /* TOOLBAR */
    .toolbar {
      border-bottom: var(--border-w) solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      border: var(--border-w) solid var(--border);
      background: var(--bg);
      outline: none;
      transition: box-shadow 0.15s;
    }
    .search-box:focus {
      box-shadow: 4px 4px 0 var(--accent);
    }
    .search-box::placeholder { color: #999; }

    .filter-btn {
      padding: 0.5rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      border: var(--border-w) solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    .filter-btn:hover {
      box-shadow: 3px 3px 0 var(--shadow);
      transform: translate(-1px, -1px);
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--surface);
    }

    .chart-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 0;
    }

    /* CARD */
    .card {
      border-right: var(--border-w) solid var(--border);
      border-bottom: var(--border-w) solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      transition: transform 0.1s;
    }
    .card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--shadow);
      z-index: 2;
      position: relative;
    }

    .card-header {
      padding: 1rem 1.25rem 0.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .card-category {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border: 2px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-desc {
      padding: 0 1.25rem 0.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .card-preview {
      flex: 1;
      min-height: 260px;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
      background: #fafaf7;
      overflow: hidden;
    }
    .card-preview .vega-embed {
      width: 100%;
    }
    .card-preview .vega-embed summary { display: none !important; }

    .card-actions {
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 0.5rem;
    }
    .btn {
      flex: 1;
      padding: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      border: var(--border-w) solid var(--border);
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
      transition: all 0.1s;
    }
    .btn:hover {
      box-shadow: 3px 3px 0 var(--shadow);
      transform: translate(-1px, -1px);
    }
    .btn--primary { background: var(--accent); color: #fff; }
    .btn--secondary { background: var(--accent3); }
    .btn--code { background: var(--accent2); }

    .btn-copied {
      background: var(--text) !important;
      color: #fff !important;
    }

    /* FOOTER */
    .footer {
      border-top: var(--border-w) solid var(--border);
      padding: 2rem;
      text-align: center;
      background: var(--text);
      color: var(--bg);
    }
    .footer a { color: var(--accent3); text-decoration: none; font-weight: 700; }
    .footer a:hover { text-decoration: underline; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: var(--border-w) solid var(--border);
      box-shadow: 10px 10px 0 var(--shadow);
      width: 100%;
      max-width: 800px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: var(--border-w) solid var(--border);
      background: var(--accent3);
    }
    .modal-header h2 {
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }
    .modal-close {
      width: 36px;
      height: 36px;
      border: var(--border-w) solid var(--border);
      background: var(--surface);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: var(--accent5); color: #fff; }
    .modal-body {
      flex: 1;
      overflow: auto;
      padding: 0;
    }
    .modal-body pre {
      margin: 0;
      padding: 1.25rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
      background: #1a1a2e;
      color: #e8e4d9;
    }
    .modal-footer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-top: var(--border-w) solid var(--border);
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
    }
    .empty-state h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--text-muted); }

    /* LOADING */
    .loading-card .card-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 2.2rem; }
      .gallery { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>vega<span>viz</span></h1>
    <p>The only chart gallery you need. Copy-paste Vega-Lite specs into Power BI Deneb or anywhere else.</p>
    <div class="hero-badges">
      <span class="badge badge--accent">23 Charts</span>
      <span class="badge badge--accent2">Deneb Ready</span>
      <span class="badge badge--accent4">Vega-Lite v5</span>
      <span class="badge">Open Source</span>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" class="search-box" id="search" placeholder="Search charts...">
    <button class="filter-btn active" data-filter="all">All</button>
    <span class="chart-count" id="chartCount"></span>
  </div>

  <main class="gallery" id="gallery"></main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Chart Spec</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <pre><code id="modalCode"></code></pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn--primary" id="modalCopy">Copy JSON</button>
        <a class="btn btn--secondary" id="modalVegaEditor" href="#" target="_blank" rel="noopener">Open in Vega Editor</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>
      <strong>vegaviz</strong> &mdash; built for the Deneb & Vega community
      &nbsp;|&nbsp;
      <a href="https://github.com/CodeWithBehnam/vegaviz">GitHub</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/CodeWithBehnam/vegaviz/tree/main/charts">Browse Specs</a>
    </p>
  </footer>

    { Category: 'Beta', Month: 'Apr', Sales: 1 },
    { Category: 'Gamma', Month: 'Jan', Sales: 3 },
    { Category: 'Gamma', Month: 'Feb', Sales: 3 },
    { Category: 'Gamma', Month: 'Mar', Sales: 2 },
    { Category: 'Gamma', Month: 'Apr', Sales: 2 },
  ],
};

const categories = ['all', ...new Set(CHARTS.map(c => c.category))];
const specCache = {};

// Build filter buttons
const toolbar = document.querySelector('.toolbar');
categories.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = cat;
  btn.textContent = cat;
  toolbar.insertBefore(btn, document.getElementById('chartCount'));
});

// Event delegation for filters
toolbar.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderGallery();
});

document.getElementById('search').addEventListener('input', renderGallery);

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.querySelector('.filter-btn.active').dataset.filter;
  return CHARTS.filter(c => {
    const matchCat = cat === 'all' || c.category === cat;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.category.includes(q);
    return matchCat && matchQ;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const filtered = getFiltered();
  document.getElementById('chartCount').textContent = `${filtered.length} chart${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    gallery.innerHTML = '<div class="empty-state"><h3>No charts found</h3><p>Try a different search or filter</p></div>';
    return;
  }

  gallery.innerHTML = filtered.map((chart, i) => `
    <div class="card loading-card" data-idx="${CHARTS.indexOf(chart)}">
      <div class="card-header">
        <span class="card-title">${chart.name}</span>
        <span class="card-category" style="border-color:${chart.accent};color:${chart.accent}">${chart.category}</span>
      </div>
      <div class="card-desc">${chart.desc}</div>
      <div class="card-preview" id="preview-${CHARTS.indexOf(chart)}">Loading...</div>
      <div class="card-actions">
        <button class="btn btn--primary" onclick="copySpec(${CHARTS.indexOf(chart)}, this)">Copy Spec</button>
        <button class="btn btn--code" onclick="viewCode(${CHARTS.indexOf(chart)})">View JSON</button>
        <a class="btn btn--secondary" href="#" onclick="openEditor(${CHARTS.indexOf(chart)});return false;">Vega Editor</a>
      </div>
    </div>
  `).join('');

  filtered.forEach(chart => {
    const idx = CHARTS.indexOf(chart);
    loadAndRender(idx);
  });
}

async function fetchSpec(idx) {
  if (specCache[idx]) return specCache[idx];
  const chart = CHARTS[idx];
  const resp = await fetch(`${REPO_RAW}/${chart.file}`);
  const spec = await resp.json();
  specCache[idx] = spec;
  return spec;
}

function stripUsermeta(spec) {
  const clean = JSON.parse(JSON.stringify(spec));
  delete clean.usermeta;
  return clean;
}

// Replace all __Placeholder__ field names with sample data column names
function replacePlaceholders(str) {
  return str
    .replace(/"__Category__"/g, '"Category"')
    .replace(/"__SubCategory__"/g, '"Region"')
    .replace(/"__Value__"/g, '"Sales"')
    .replace(/"__Date__"/g, '"Date"')
    .replace(/"__Series__"/g, '"Category"')
    .replace(/"__Stack__"/g, '"Region"')
    .replace(/"__Row__"/g, '"Category"')
    .replace(/"__Column__"/g, '"Region"')
    .replace(/"__X__"/g, '"Sales"')
    .replace(/"__Y__"/g, '"Profit"')
    .replace(/"__Size__"/g, '"Sales"')
    .replace(/"__Start__"/g, '"Start"')
    .replace(/"__End__"/g, '"End"')
    .replace(/"__Actual__"/g, '"Sales"')
    .replace(/"__Target__"/g, '"Target"')
    .replace(/"__Current__"/g, '"Sales"')
    .replace(/"__Previous__"/g, '"Target"')
    .replace(/"__Year__"/g, '"Category"')
    .replace(/"__BarValue__"/g, '"Sales"')
    .replace(/"__LineValue__"/g, '"Profit"')
    .replace(/"__Stage__"/g, '"Stage"')
    .replace(/"__Task__"/g, '"Category"')
    .replace(/"__Metric__"/g, '"Category"')
    .replace(/"__Max__"/g, '"Max"')
    .replace(/"__Label__"/g, '"Category"')
    .replace(/"__Item__"/g, '"Category"')
    .replace(/"__Period__"/g, '"Month"')
    .replace(/"__Rank__"/g, '"Sales"')
    .replace(/"__Order__"/g, '"Order"');
}

// Replace all pbiColor expressions with real hex colors
function replacePbiColors(str) {
  const colors = ['#4C78A8', '#F58518', '#E45756', '#72B7B2', '#54A24B', '#EECA3B'];
  return str
    .replace(/\{"expr":\s*"pbiColor\((\d+)\)"\}/g, (_, i) => `"${colors[+i] || colors[0]}"`)
    .replace(/\{"expr":\s*"pbiColor\('good'\)"\}/g, '"#54A24B"')
    .replace(/\{"expr":\s*"pbiColor\('bad'\)"\}/g, '"#E45756"')
    .replace(/\{"expr":\s*"pbiColor\('min'\)"\}/g, '"#4C78A8"')
    .replace(/\{"expr":\s*"pbiColor\('max'\)"\}/g, '"#E45756"')
    .replace(/\{"expr":\s*"pbiColor\(0\)"\}/g, '"#4C78A8"')
    .replace(/\{"expr":\s*"pbiColor\(1\)"\}/g, '"#F58518"')
    .replace(/"scheme"\s*:\s*"pbiColor\w+"/g, '"scheme": "tableau10"');
}

// Recursively inject sample data into any {name: "dataset"} data reference
function injectData(obj, sampleData) {
  if (!obj || typeof obj !== 'object') return;
  if (Array.isArray(obj)) { obj.forEach(item => injectData(item, sampleData)); return; }
  if (obj.data && obj.data.name === 'dataset') {
    obj.data = { values: sampleData };
  }
  // Recurse into known nesting keys
  ['layer', 'concat', 'hconcat', 'vconcat'].forEach(k => {
    if (Array.isArray(obj[k])) obj[k].forEach(item => injectData(item, sampleData));
  });
  if (obj.spec) injectData(obj.spec, sampleData);
}

async function loadAndRender(idx) {
  const el = document.getElementById(`preview-${idx}`);
  if (!el) return;
  try {
    const spec = await fetchSpec(idx);
    const renderSpec = stripUsermeta(spec);
    const chart = CHARTS[idx];

    // 1) Replace placeholders
    let specStr = replacePlaceholders(JSON.stringify(renderSpec));

    // 2) Replace pbiColor expressions
    specStr = replacePbiColors(specStr);

    let previewSpec = JSON.parse(specStr);

    // 3) Get the right sample data for this chart type
    const sampleData = SAMPLE_DATA[chart.dataKey] || SAMPLE_DATA.general;

    // 4) Deep inject data into all levels of the spec
    injectData(previewSpec, sampleData);

    // 5) Set fixed dimensions for preview
    if (!previewSpec.facet) {
      previewSpec.width = 370;
      previewSpec.height = 220;
    }
    previewSpec.autosize = { type: 'fit', contains: 'padding' };

    el.innerHTML = '';
    await vegaEmbed(el, previewSpec, {
      actions: false,
      renderer: 'svg',
      config: {
        view: { stroke: 'transparent' },
        font: 'Space Grotesk',
        axis: { domain: false, gridColor: '#eee', labelColor: '#666', titleColor: '#333' },
        legend: { labelColor: '#666' }
      }
    });
    el.closest('.card').classList.remove('loading-card');
  } catch (err) {
    console.error(`Preview error for ${CHARTS[idx].name}:`, err);
    el.innerHTML = `<span style="color:#E45756;font-size:0.8rem">Preview unavailable</span>`;
    el.closest('.card').classList.remove('loading-card');
  }
}

async function copySpec(idx, btn) {
  const spec = await fetchSpec(idx);
  await navigator.clipboard.writeText(JSON.stringify(spec, null, 2));
  btn.textContent = 'Copied!';
  btn.classList.add('btn-copied');
  setTimeout(() => {
    btn.textContent = 'Copy Spec';
    btn.classList.remove('btn-copied');
  }, 2000);
}

async function viewCode(idx) {
  const spec = await fetchSpec(idx);
  document.getElementById('modalTitle').textContent = CHARTS[idx].name;
  document.getElementById('modalCode').textContent = JSON.stringify(spec, null, 2);
  document.getElementById('modalCopy').onclick = async () => {
    await navigator.clipboard.writeText(JSON.stringify(spec, null, 2));
    document.getElementById('modalCopy').textContent = 'Copied!';
    setTimeout(() => document.getElementById('modalCopy').textContent = 'Copy JSON', 2000);
  };
  const editorUrl = `https://vega.github.io/editor/#/url/vega-lite/${btoa(JSON.stringify(stripUsermeta(spec)))}`;
  document.getElementById('modalVegaEditor').href = editorUrl;
  document.getElementById('modal').classList.add('active');
}

function openEditor(idx) {
  fetchSpec(idx).then(spec => {
    const clean = stripUsermeta(spec);
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(clean))));
    window.open(`https://vega.github.io/editor/#/url/vega-lite/${encoded}`, '_blank');
  });
}

// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('active');
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('active');
});

// Init
renderGallery();
</script>

</body>
</html>
